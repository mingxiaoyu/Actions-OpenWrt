name: Lede Builder

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 18 1 * *'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: lede.config
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  UPLOAD_TO_TG_SH: scripts/upload-to-telegram.sh
  ENV_SH: scripts/environment.sh
  FREE_DISK_SH: scripts/free_disk_space.sh
  PATCHES_DIR: patches
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  prepare_release:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id || github.event_name == 'schedule'
    outputs:
      release_tag: ${{ steps.release_tag.outputs.release_tag }}
    steps:
      - name: Get release tag
        id: release_tag
        run: |
          release_tag="Lede-Rockchip-$(date +%Y-%m-%d)"
          echo "release_tag=$release_tag" >> $GITHUB_OUTPUT

  build_openwrt:
    needs: prepare_release
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        VERSION: [5.15, latest]
        FREQUENCY: [1.5, 1.6]
        SET: [docker, non-docker]

    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          chmod +x ${{ env.ENV_SH }} && ${{ env.ENV_SH }}  # Fixed path usage
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get -qq update -y
          sudo apt-get -qq full-upgrade -y
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Cache
        uses: klever1988/cachewrtbuild@main
        with:
          ccache: 'true'
          mixkey: 'armv8_${{ matrix.VERSION }}'
          prefix: ${{ github.workspace }}/openwrt

      - name: Patch
        run: |
          if [ "${{ matrix.VERSION }}" == "5.15" ]; then
            cp -f lede/armv8.mk openwrt/target/linux/rockchip/image/armv8.mk
            cp -f lede/uboot-rockchip-Makefile openwrt/package/boot/uboot-rockchip/Makefile
            rm -rf openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip
            cp -rf lede/rockchip/files/arch/arm64/boot/dts/rockchip/. openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip
            rm -rf openwrt/target/linux/rockchip/patches-5.15
            cp -rf lede/rockchip/patches-5.15/. openwrt/target/linux/rockchip/patches-5.15

            echo "replace the file during 5.15 kernel"
          fi

          if [ -e "$PATCHES_DIR" ]; then
            if [ "${{ matrix.FREQUENCY }}" == "1.6" ]; then
              rm -f "$PATCHES_DIR"/*999-rk3328-orangepi-r1-plus-lts-patch.patch

              echo "remove 1.6 frequency"
            fi
            mv "$PATCHES_DIR" openwrt/patches
            cd openwrt
            git apply --ignore-whitespace patches/*.patch
            rm -rf patches
          fi

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          rm -rf feeds/luci/applications/luci-app-mosdns
          rm -rf feeds/packages/net/{alist,adguardhome,mosdns,xray*,v2ray*,sing*,smartdns}
          rm -rf feeds/packages/utils/v2dat
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/kenzok8/golang feeds/packages/lang/golang
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config

          if [ "${{ matrix.FREQUENCY }}" == "1.5" ]; then

            sed -i '/^CONFIG_TARGET_MULTI_PROFILE=y/d' openwrt/.config
            sed -i '/^CONFIG_TARGET_DEVICE_rockchip_armv8_/ { /_xunlong_orangepi-r1-plus-lts/!d; }' openwrt/.config

            echo "only keep r1-plus-lts in config"
          fi

          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

          # Update KERNEL_PATCHVER if needed
          if [ "${{ matrix.VERSION }}" == "5.15" ]; then
            sed -i 's/KERNEL_PATCHVER:=.*/KERNEL_PATCHVER:=5.15/g' target/linux/rockchip/Makefile

            echo "set the kernel as 5.15"
          fi

      - name: Download package
        id: package
        run: |
          cd openwrt
          if [ "${{ matrix.SET }}" == "docker" ]; then
            echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config

            echo "added docker in config"
          fi
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Get Kernel Patchver
        run: |
          cd openwrt
          grep "^KERNEL_PATCHVER:=" target/linux/rockchip/Makefile | sed 's/KERNEL_PATCHVER:=//' |
            awk '{print "KERNEL_PATCHVER=" $0}' >> $GITHUB_ENV

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          echo -e "✅ rockchip平台.\n🔔 长时间无法启动请尝试重启或重刷.\n⏰只只有 R1 Plus LTS 版本的频率为 1.5GHz,其他版本的频率为 1.6GHz.\n⚠️ 如出现不稳定可尝试cpu降频." >> release.txt
          cd openwrt/bin/targets/*/*
          rm -rf packages
          SUFFIX="${{ env.KERNEL_PATCHVER }}-${{ matrix.FREQUENCY }}"
          [ "${{ matrix.SET }}" == "docker" ] && SUFFIX="${SUFFIX}-docker"
          for file in *.img.gz; do
            if [ -e "$file" ]; then
              drive=$(echo "$file" | sed -E 's/^(openwrt-rockchip-armv8-)(.*)(-(ext4|squashfs)-sysupgrade\.img\.gz)$/\2-\4/')
              new_file="${drive}-${SUFFIX}.img.gz"
              mv "$file" "$new_file"
              echo "Renamed: $file to $new_file"
            fi
          done
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        with:
          name: OpenWrt_firmware_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Upload firmware to release
        uses: softprops/action-gh-release@master
        if: steps.organize.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

  notice_and_cleanup:
    needs: build_openwrt
    runs-on: ubuntu-22.04
    steps:
      - name: Upload firmware to telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
              echo "TELEGRAM_BOT_TOKEN is missing!"
              exit 0
          fi
          chmod +x $UPLOAD_TO_TG_SH
          cd $FIRMWARE

          FILE_NAME=xunlong_orangepi-r1-plus-lts-ext4-sysupgrade-docker.img.gz
          response=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/${{ needs.prepare_release.outputs.release_tag }})
          download_url=$(echo "$response" | jq -r '.assets[] | select(.name == "'$FILE_NAME'") | .browser_download_url')
          curl -L "$download_url" -o "$FILE_NAME"

          if [ -f "$FILE_NAME" ]; then
            CAPTION="kernel $KERNEL_PATCHVER from lede source code
                [仓库](https://github.com/${{ github.repository }}/)
                [下载地址: ${{ needs.prepare_release.outputs.release_tag }}](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare_release.outputs.release_tag }})"

            $GITHUB_WORKSPACE/$UPLOAD_TO_TG_SH -file "$FILE_NAME" -token ${{ secrets.TELEGRAM_BOT_TOKEN }} -chatid ${{ secrets.TELEGRAM_CHAT_ID }} -caption "$CAPTION" || true
          fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@master
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 10
          delete_tags: true
          delete_tag_pattern: Lede-Rockchip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
